rubric:
  usability:
    1: 几乎无法直接上手
    2: 能看懂但难复现
    3: 可安装可理解
    4: 文档清楚、上手顺畅
    5: 开箱即用、说明完整、路径明确
  completeness:
    1: 只有概念
    2: 最小原型
    3: 核心内容齐全
    4: 文档、示例和结构完整
    5: 内容、示例、边界和说明都成熟
  maintenance:
    1: 长期停更且仓库粗糙
    2: 偶有维护
    3: 近期有更新或基本可用
    4: 活跃且结构稳定
    5: 持续活跃、维护信号强
  privacy_friendliness:
    1: 强依赖高度敏感私密数据
    2: 高度依赖私人记录
    3: 可混合使用公开与私有数据
    4: 公开资料即可体验主体能力
    5: 几乎完全公开资料或本地可控、风险低
